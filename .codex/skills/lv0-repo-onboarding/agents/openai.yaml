interface:
  display_name: "Lv0 Repo Onboarding"
  short_description: "Map an unfamiliar repo and capture reusable context"
  default_prompt: "Use $lv0-repo-onboarding to inspect the repo layout, identify key files and commands, refresh the shared tracker notes, and summarize the next files to inspect."

policy:
  allow_implicit_invocation: true
